services:
  api:
    image: zatca_rag:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - .:/app
      - app-data:/app/data
      - faiss-index:/app/faiss_index
    ports:
      - "8000:8000"
    networks:
      - rag_zatca_network
    command: [ "uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]


networks:
  rag_zatca_network:
    driver: bridge

volumes:
  app-data:
  faiss-index:
