version: '3.8'

services:
  app:
    image: zatca_rag:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - app-data:/app/data
      - faiss-index:/app/faiss_index
    ports:
      - "8501:8501"
    networks:
      - rag_zatca_network

networks:
  rag_zatca_network:
    driver: bridge

volumes:
  app-data:
  faiss-index:
